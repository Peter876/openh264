name: build
on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "NOTICE"
      - ".gitignore"
      - "libraries.properties"
      - "build.sh"
    tags:
      - "*"

jobs:
  build:
    runs-on: ${{ matrix.platform.host }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x86
            host: windows-2022
            target_arch: x86
            expected_machine: x86
          - name: windows-x86_64
            host: windows-2022
            target_arch: x86_64
            expected_machine: x64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2

      - name: Detect Native CMake Path (Windows)
        id: detect_cmake
        shell: powershell
        run: |
          $cmake = (Get-Command cmake).Source
          echo "cmake_path=$cmake" >> $env:GITHUB_ENV

      - name: Install dependencies (Windows)
        shell: msys2 {0}
        run: pacman -S --noconfirm base-devel git nasm ninja

      - name: Set up Python (Windows)
        uses: actions/setup-python@v6
        id: python
        with:
          python-version: "3.14"

      - name: Build OpenH264 (Windows)
        shell: msys2 {0}
        run: |
          export PATH="$(dirname "$(cygpath -u "$cmake_path")"):$PATH"
          export PATH="$(dirname "$(cygpath -u "${{ steps.python.outputs.python-path }}")"):$PATH"
          bash build.sh
        env:
          OPENH264_WINDOWS_ARCH: ${{ matrix.platform.target_arch }}
          MSYS2_ARG_CONV_EXCL: "*"
          MSYS_NO_PATHCONV: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify openh264 machine type
        shell: powershell
        run: |
          $lib = Get-Item "artifacts/lib/openh264.lib" -ErrorAction Stop
          $dump = & dumpbin /headers $lib.FullName | Out-String
          if ("${{ matrix.platform.expected_machine }}" -eq "x86") {
            if ($dump -notmatch "machine \(x86\)") { throw "Expected x86 machine type in $($lib.FullName)" }
            if ($dump -match "machine \(x64\)") { throw "Found x64 objects in x86 artifact $($lib.FullName)" }
          } else {
            if ($dump -notmatch "machine \(x64\)") { throw "Expected x64 machine type in $($lib.FullName)" }
          }

      - name: Prepare for artifact (Windows)
        run: |
          Compress-Archive -Path artifacts -DestinationPath openh264.${{ matrix.platform.name }}.zip

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v6
        with:
          name: openh264.${{ matrix.platform.name }}.zip
          path: openh264.${{ matrix.platform.name }}.zip

  create-release:
    name: Create Release
    if: contains(github.ref, 'tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/download
        with:
          platform: windows-x86
      - uses: ./.github/actions/download
        with:
          platform: windows-x86_64
      - name: Env to output
        run: |
          echo "package_paths<<EOF" >> $GITHUB_OUTPUT
          cat package_paths.env >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        id: env
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.env.outputs.package_paths }}
